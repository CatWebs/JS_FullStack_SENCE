<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow Catalina Cisternas</title>
    <link rel="icon" href="./media/Taskflow_icon.png" />
    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="navbar container-fluid">
      <div class="container py-2">
        <a class="navbar-brand fw-semibold" href="./index.html">
          <i class="bi bi-clipboard2-check-fill me-1"></i> TaskFlow
        </a>
      </div>
    </header>
    <main class="container pt-5">
      <span class="badge badge-title rounded-pill p-2">WORKSPACE</span>
      <div
        class="d-flex justify-content-md-between flex-column flex-md-row justify-content-end align-items-md-center mb-2 mb-md-4"
      >
        <h1 class="inter-title">Gestión de tareas</h1>
        <div class="action-buttons ms-auto mt-4 mt-md-0">
          <button type="button" class="btn mb-1 btn-filtro fw-bold disabled">
            <!-- Próxima funcionalidad: Abrir un Modal con filtros. Las tareas serán filtradas por prioridad -->
            <i class="bi bi-filter"></i> Filtrar
          </button>
          <button
            id="btnAddTask"
            type="button"
            class="btn mb-1 btn-agregar fw-bold"
            data-bs-toggle="modal"
            data-bs-target="#addTask"
          >
            <!-- Próxima funcionalidad: Abrir un Modal con formulario para añadir tareas -->
            + Agregar tarea
          </button>
        </div>
      </div>

      <div class="d-flex flex-column box tareas-incompletas mb-5 container p-0">
        <div class="title-box">
          <h2>
            <i class="bi bi-list-task me-1"></i> Tareas activas
            <span class="badge badge-task rounded-circle align-middle">0</span>
          </h2>
        </div>

        <div id="task-container">
          <!-- RENDER TAREAS ACTIVAS-->
        </div>
      </div>

      <div class="d-flex flex-column box tareas-completas mb-5">
        <div class="title-box-complete">
          <h3><i class="bi bi-check-all"></i> Tareas realizadas</h3>
          <button
            class="btn btn-task btn-delete-all btn-with-tooltip"
            type="button"
            id="btnDeleteAll"
            data-bs-toggle="tooltip"
            data-bs-placement="bottom"
            data-bs-title="Eliminar tareas"
            onclick="deleteAllTask()"
          >
            <i class="bi bi-trash"></i>
          </button>
        </div>
        <div id="task-complete-container">
          <!-- RENDER TAREAS COMPLETADAS -->
        </div>
      </div>
    </main>

    <footer class="text-center py-3">© 2026 Catalina TaskFlow</footer>

    <div
      class="modal fade"
      id="addTask"
      tabindex="-1"
      data-bs-backdrop="static"
      data-bs-keyboard="false"
    >
      <div class="modal-dialog modal-dialog-centered modal-md">
        <div class="modal-content">
          <div class="modal-header border-0">
            <h5 class="modal-title">Agregar tarea</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="addTaskForm" class="needs-validation" novalidate>
              <div class="mb-3">
                <label class="form-label" for="titleInput"
                  >Título de la tarea</label
                >
                <input
                  id="titleInput"
                  type="text"
                  class="form-control"
                  placeholder="Título de la tarea"
                  aria-describedby="maxCharHelp"
                  maxlength="150"
                  required
                />
                <div class="d-flex justify-content-between">
                  <div
                    class="invalid-feedback d-block"
                    id="titleError"
                    style="visibility: hidden"
                  >
                    Supera el límite de 150 caracteres.
                  </div>
                  <small id="maxCharHelp" class="form-text text-muted ms-auto"
                    >0/150</small
                  >
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label" for="descriptionInput"
                  >Descripción de la tarea</label
                >
                <textarea
                  id="descriptionInput"
                  class="form-control"
                  placeholder="Descripción de la tarea"
                ></textarea>
              </div>

              <div class="mb-3">
                <label class="form-label" for="priorityInput"
                  >Prioridad de la tarea</label
                >
                <select class="form-select" id="priorityInput">
                  <option selected disabled>Seleccionar</option>
                  <option value="1">Prioridad alta</option>
                  <option value="2">Prioridad media</option>
                  <option value="3">Prioridad baja</option>
                </select>
              </div>

              <div class="form-check form-switch mb-3">
                <input
                  class="form-check-input"
                  type="checkbox"
                  role="switch"
                  id="switchCheckDate"
                />
                <label class="form-check-label" for="switchCheckDate"
                  >Añadir fecha límite</label
                >
              </div>

              <div class="mb-3 d-none" id="displayDateInput">
                <label class="form-label" for="fecha"
                  >Fecha límite para realizar la tarea</label
                >
                <input
                  class="form-control"
                  type="date"
                  id="fecha"
                  name="fecha-tarea"
                  max="2030-12-31"
                />
              </div>

              <div
                class="d-flex justify-content-around align-items-stretch gap-3"
              >
                <button
                  type="submit"
                  class="btn btn-agregar fw-bold w-50"
                  id="btnAddTaskSubmit"
                >
                  + Agregar tarea
                </button>

                <button
                  type="button"
                  data-bs-dismiss="modal"
                  class="btn btn-cancel-modal fw-bold w-50"
                >
                  Cancelar
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/toastify-js"
    ></script>
    <script src="./src/task-data.js"></script>
    <script src="./src/task-manager.js"></script>
    <script src="./src/events.js"></script>
  </body>
</html>
